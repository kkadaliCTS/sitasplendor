  const id=btn.getAttribute("data-id");
  if(action==="closemodal"){
    S.modal=null;S.editFlat=null;S.editExpData=null;S.editPayData=null;render();return;
  }
  if(action==="editexp"){
    const e=S.expenses.find(x=>x.id===id);
    if(e){S.editExpData={...e};S.modal="editexp";render();}
  }
  if(action==="editpay"){
    const p=S.payments.find(x=>x.id===id);
    if(p){S.editPayData={...p};S.modal="editpay";render();}
  }
  if(action==="delexp"){
    if(!confirm("Delete this expense?\n(ఈ ఖర్చు delete చేయాలా?)"))return;
    S.expenses=S.expenses.filter(e=>e.id!==id);
    sv("ex",S.expenses);render();toast("✅ Deleted","#E74C3C");
  }
  if(action==="delpay"){
    if(!confirm("Delete this payment?\n(ఈ చెల్లింపు delete చేయాలా?)"))return;
    S.payments=S.payments.filter(p=>p.id!==id);
    sv("py",S.payments);render();toast("✅ Deleted","#E74C3C");
  }
  if(action==="saveeditexp"){
    const eid=S.editExpData.id;
    const d=document.getElementById("med").value;
    const ds=document.getElementById("meds").value.trim();
    const ct=document.getElementById("mect").value;

    S.expenses=S.expenses.map(x=>x.id===eid?{...x,date:d,desc:ds,cat:ct,amt:a}:x);
    S.modal=null;S.editExpData=null;
    sv("ex",S.expenses);render();toast("✅ Expense updated");
  }
  if(action==="saveeditpay"){
    const pid=S.editPayData.id;
    const f=document.getElementById("mef2").value;
    const a=Number(document.getElementById("mepa").value);
    const d=document.getElementById("mepd").value;
    const m=document.getElementById("mepm").value;
    const n=document.getElementById("mepn").value.trim();
    if(!f||!a)return alert("Fill flat & amount");
    const fl=S.flats.find(x=>x.flat===f);
    S.payments=S.payments.map(x=>x.id===pid?{...x,flat:f,owner:fl?fl.owner:x.owner,date:d,mode:m,amt:a,note:n}:x);
    S.modal=null;S.editPayData=null;
    sv("py",S.payments);render();toast("✅ Payment updated");
  }
});

// ===== MONTH DATA — Running balance like Prasad's register =====
function gm(){
  const m=S.selMonth;
  // Current month's entries
  const mE=S.expenses.filter(e=>e.date?.startsWith(m));
  const mP=S.payments.filter(p=>p.date?.startsWith(m));
  const tE=mE.reduce((a,e)=>a+Number(e.amt),0);
  const tC=mP.reduce((a,p)=>a+Number(p.amt),0);
  const ps=new Set(mP.map(p=>p.flat));

  // Running balance = Opening + ALL payments before & during this month - ALL expenses before & during this month
  // This matches Prasad's register: Feb closing = March opening
  const endOfMonth=m+"-31"; // include full month
  const allPayTillNow=S.payments.filter(p=>p.date<=endOfMonth).reduce((a,p)=>a+Number(p.amt),0);
  const allExpTillNow=S.expenses.filter(e=>e.date<=endOfMonth).reduce((a,e)=>a+Number(e.amt),0);
  const cl=S.openBal+allPayTillNow-allExpTillNow;

  // Opening balance for THIS month = closing of previous month
  const allPayBeforeMonth=S.payments.filter(p=>p.date<m+"-01").reduce((a,p)=>a+Number(p.amt),0);
  const allExpBeforeMonth=S.expenses.filter(e=>e.date<m+"-01").reduce((a,e)=>a+Number(e.amt),0);
  const monthOpening=S.openBal+allPayBeforeMonth-allExpBeforeMonth;

  return{mE,mP,tE,tC,ps,cl,monthOpening};
}

// ===== INDEPENDENT PAST DUES =====
function getDues(){
  const list=[];
  S.flats.forEach(f=>{
    const pa=Number(f.pendingAmt)||0;
    if(pa<=0)return;
    const paid=S.payments.filter(p=>p.flat===f.flat&&p.isDue).reduce((a,p)=>a+Number(p.amt),0);
    const rem=Math.max(0,pa-paid);
    if(rem>0)list.push({...f,entered:pa,paid,remaining:rem,months:Number(f.pendingMonths)||0});
  });
  list.sort((a,b)=>b.remaining-a.remaining);
  return{list,total:list.reduce((a,d)=>a+d.remaining,0),totalPaid:list.reduce((a,d)=>a+d.paid,0)};
}

  const{mE,mP,tE,tC,cl,monthOpening}=gm();

      ["S.No","Flat","Owner","Phone","Months","Since","Amount"]];

    eData.push([]);eData.push(["","","","TOTAL",tE]);
    const ws2=XLSX.utils.aoa_to_sheet(eData);
    ws2["!cols"]=[{wch:5},{wch:14},{wch:28},{wch:14},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws2,"Expenses "+mn.slice(0,3));

    const pData=[[AP+" — PAYMENTS "+mn],[""],["S.No","Flat","Owner","Date","Amount","Mode","Note"]];
    mP.forEach((p,i)=>{pData.push([i+1,p.flat,p.owner,fD(p.date),p.amt,p.mode,p.note||""])});
    pData.push([]);pData.push(["","","","TOTAL",tC]);
    const ws3=XLSX.utils.aoa_to_sheet(pData);
    ws3["!cols"]=[{wch:5},{wch:8},{wch:25},{wch:14},{wch:10},{wch:14},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws3,"Payments "+mn.slice(0,3));

    const sData=[[AP+" — BALANCE SHEET "+mn],[""],["Item","Amount"],["Opening Balance ("+mn+")",Math.round(monthOpening)],["(+) Collected",tC],["(-) Expenses",tE],[""],["Closing Balance",Math.round(cl)]];
    const{total:tDue}=getDues();

    const ws4=XLSX.utils.aoa_to_sheet(sData);
    ws4["!cols"]=[{wch:30},{wch:15}];
    XLSX.utils.book_append_sheet(wb,ws4,"Balance");
  }
  const fname=type==="dues"?"SitaSplendor_PastDues":"SitaSplendor_"+S.selMonth;
  XLSX.writeFile(wb,fname+".xlsx");
  toast("✅ Excel (.xlsx) downloaded!");
}

    h+='<div style="font-size:11px;font-weight:700;color:#888;margin:12px 0 6px">PAYMENTS ('+mP.length+') — Total: '+fm(tC)+'</div>';
    if(!mP.length)h+='<div class="ety">No payments this month</div>';
    mP.forEach((p,i)=>{h+='<div class="lc"><div class="lr"><div class="mn"><div class="tt"><b>'+ec(p.flat)+'</b> – '+ec(p.owner||"")+'</div><div class="sb">'+fD(p.date)+' | '+p.mode+(p.note?' | '+ec(p.note):'')+' | '+fm(p.amt)+'</div></div><div style="display:flex;gap:4px;flex-shrink:0"><button class="del" style="color:var(--bl2)" data-action="editpay" data-id="'+p.id+'">✏</button><button class="del" data-action="delpay" data-id="'+p.id+'">✕</button></div></div></div>'});

    h+='<div style="font-size:11px;font-weight:700;color:#888;margin:12px 0 6px">EXPENSES ('+mE.length+') — Total: '+fm(tE)+'</div>';
    if(!mE.length)h+='<div class="ety">No expenses this month</div>';
    mE.forEach((e,i)=>{h+='<div class="lc"><div class="lr"><div class="mn"><div class="tt">'+ec(e.desc)+'</div><div class="sb">'+fD(e.date)+' | '+e.cat+' | '+fm(e.amt)+'</div></div><div style="display:flex;gap:4px;flex-shrink:0"><button class="del" style="color:var(--bl2)" data-action="editexp" data-id="'+e.id+'">✏</button><button class="del" data-action="delexp" data-id="'+e.id+'">✕</button></div></div></div>'});
  }

  h+='</div>';

  // Tabs
  h+='<div class="tabs">';
  [["home","🏠","Home"],["dues","📌","Dues"],["flats","📋","Flats"],["report","📊","Report"]].forEach(t=>{
    h+='<button class="tb'+(S.tab===t[0]?' on':'')+'" onclick="set({tab:\''+t[0]+'\'})"><span class="i">'+t[1]+'</span>'+t[2];
    if(t[0]==="dues"&&dueList.length)h+='<span class="badge" style="background:#E67E22">'+dueList.length+'</span>';
    h+='</button>';
  });h+='</div>';

  // ===== MODALS =====
  if(S.modal==="exp")h+=ml("💸 Add Expense","ఖర్చు వివరాలు",fd("Date","<input type='date' id='md' value='"+S.ef.date+"'>")+fd("Description","<input id='mds' placeholder='e.g. Security Salary'>")+fd("Category","<select id='mct'>"+CATS.map(c=>"<option>"+c+"</option>").join("")+"</select>")+fd("Amount (₹)","<input type='number' id='ma' placeholder='10000' inputmode='numeric'>")+'<button class="sub-btn" style="background:#E74C3C" onclick="sE()">Add ✅</button>');
  if(S.modal==="pay"){
    let pb=fd("Flat","<select id='mf'><option value=''>— Select —</option>"+S.flats.map(f=>"<option value='"+f.flat+"'>"+f.flat+" – "+(f.owner||"")+"</option>").join("")+"</select>");
    pb+=fd("Amount (₹)","<input type='number' id='mpa' value='"+MT+"' inputmode='numeric'>")+fd("Date","<input type='date' id='mpd' value='"+S.pf.date+"'>")+fd("Mode","<select id='mpm'>"+MDS.map(m=>"<option>"+m+"</option>").join("")+"</select>")+fd("Note","<input id='mpn' placeholder='e.g. Jan Feb'>");
    pb+='<button class="sub-btn" style="background:var(--gn)" onclick="sP()">Record ✅</button>';
    h+=ml("✅ Record Payment","చెల్లింపు నమోదు",pb);
  }
  if(S.modal==="due")h+=ml("📌 Enter Past Dues","Handover pending — independent section",fd("Flat","<select id='mdf'><option value=''>— Select —</option>"+S.flats.map(f=>"<option value='"+f.flat+"'>"+f.flat+" – "+(f.owner||"")+"</option>").join("")+"</select>")+fd("Months Pending","<input type='number' id='mdm' placeholder='e.g. 3' inputmode='numeric'>")+fd("From Month","<input id='mdfm' placeholder='e.g. Oct 2025'>")+fd("Amount (₹)","<input type='number' id='mda' placeholder='Auto = months × "+MT+"' inputmode='numeric'>")+'<button class="sub-btn" style="background:var(--or)" onclick="sD()">Save ✅</button>');
  if(S.modal==="bal")h+=ml("✏ Opening Balance","ప్రారంభ బ్యాలెన్స్",fd("Amount (₹)","<input type='number' id='mb' value='"+S.openBal+"' inputmode='numeric'>")+'<button class="sub-btn" style="background:#8E44AD" onclick="sB()">Save ✅</button>');
  if(S.modal==="addflat")h+=ml("🏠 Add Flat","",fd("Flat No","<input id='mfn' placeholder='601' inputmode='numeric'>")+fd("Owner","<input id='mfo' placeholder='Name'>")+fd("Phone","<input id='mfp' placeholder='9876543210' inputmode='numeric'>")+'<button class="sub-btn" style="background:var(--bl)" onclick="sF()">Add ✅</button>');
  if(S.modal==="editflat"&&S.editFlat){const ef=S.editFlat;h+=ml("✏ Flat "+ef.flat,"",fd("Owner","<input id='meo' value='"+ec(ef.owner)+"'>")+fd("Phone","<input id='mep' value='"+ec(ef.phone)+"' inputmode='numeric'>")+fd("Past Due Months","<input type='number' id='mem' value='"+(ef.pendingMonths||0)+"' inputmode='numeric'>")+fd("Since","<input id='mef' value='"+ec(ef.pendingFrom||"")+"'>")+fd("Past Due Amount","<input type='number' id='mea' value='"+(ef.pendingAmt||0)+"' inputmode='numeric'>")+'<button class="sub-btn" style="background:var(--bl)" onclick="sEF()">Save ✅</button><button class="sub-btn" style="background:#C00;margin-top:6px" onclick="delF(\''+ef.id+'\')">🗑 Delete</button>')}
  if(S.modal==="backup")h+=ml("💾 Save / Load","App update చేసినప్పుడు data safe",'<button class="sub-btn" style="background:var(--bl)" onclick="bkp()">⬇ Save My Data</button><button class="sub-btn" style="background:var(--or);margin-top:8px" onclick="document.getElementById(\'rf\').click()">⬆ Load My Data</button><input type="file" id="rf" accept=".json" style="display:none" onchange="rst(this)">');
  if(S.modal==="editexp"){
    const e=S.editExpData||{};
    h+=ml("✏ Edit Expense","ఖర్చు మార్చండి",
      fd("Date","<input type='date' id='med' value='"+(e.date||"")+"'>")+
      fd("Description","<input id='meds' value='"+ec(e.desc)+"'>")+
      fd("Category","<select id='mect'>"+CATS.map(c=>"<option"+(c===e.cat?" selected":"")+">"+c+"</option>").join("")+"</select>")+
      fd("Amount (₹)","<input type='number' id='mea2' value='"+(e.amt||"")+"' inputmode='numeric'>")+
      '<button class="sub-btn" style="background:var(--bl)" data-action="saveeditexp">Save ✅</button>');
  }
  if(S.modal==="editpay"){
    const p=S.editPayData||{};
    h+=ml("✏ Edit Payment","చెల్లింపు మార్చండి",
      fd("Flat","<select id='mef2'>"+S.flats.map(f=>"<option value='"+f.flat+"'"+(f.flat===p.flat?" selected":"")+">"+f.flat+" – "+(f.owner||"")+"</option>").join("")+"</select>")+
      fd("Amount (₹)","<input type='number' id='mepa' value='"+(p.amt||"")+"' inputmode='numeric'>")+
      fd("Date","<input type='date' id='mepd' value='"+(p.date||"")+"'>")+
      fd("Mode","<select id='mepm'>"+MDS.map(m=>"<option"+(m===p.mode?" selected":"")+">"+m+"</option>").join("")+"</select>")+
      fd("Note","<input id='mepn' value='"+ec(p.note||"")+"'>")+
      '<button class="sub-btn" style="background:var(--gn)" data-action="saveeditpay">Save ✅</button>');
  }

  document.getElementById("app").innerHTML=h;
}

// ===== ACTIONS =====
window.sE=function(){const d=document.getElementById("md").value,ds=document.getElementById("mds").value.trim(),ct=document.getElementById("mct").value,a=document.getElementById("ma").value;if(!ds||!a)return alert("Fill description & amount");S.expenses.push({id:uid(),date:d,desc:ds,cat:ct,amt:Number(a)});set({expenses:[...S.expenses],modal:null});toast("✅ Expense: "+fm(a))};
window.sP=function(){const f=document.getElementById("mf").value,a=Number(document.getElementById("mpa").value),d=document.getElementById("mpd").value,m=document.getElementById("mpm").value,n=document.getElementById("mpn").value.trim();if(!f||!a)return alert("Select flat & amount");const fl=S.flats.find(x=>x.flat===f);S.payments.push({id:uid(),flat:f,owner:fl?fl.owner:"",date:d,mode:m,amt:a,note:n});set({payments:[...S.payments],modal:null,pf:{flat:"",date:td(),mode:"UPI",amt:"",note:""}});toast("✅ Payment: "+f+" "+fm(a))};
window.sD=function(){const f=document.getElementById("mdf").value,m=Number(document.getElementById("mdm").value),fr=document.getElementById("mdfm").value.trim();let a=Number(document.getElementById("mda").value);if(!f||!m)return alert("Select flat & months");if(!a)a=m*MT;S.flats=S.flats.map(x=>x.flat===f?{...x,pendingMonths:m,pendingFrom:fr,pendingAmt:a}:x);set({flats:[...S.flats],modal:null});toast("✅ "+f+": "+m+"M = "+fm(a))};
window.sB=function(){set({openBal:Number(document.getElementById("mb").value),modal:null});toast("✅ Balance saved")};
window.sF=function(){const f=document.getElementById("mfn").value.trim(),o=document.getElementById("mfo").value.trim(),p=document.getElementById("mfp").value.trim();if(!f)return alert("Enter flat no");if(S.flats.find(x=>x.flat===f))return alert("Exists!");S.flats.push({id:uid(),flat:f,owner:o,phone:p,pendingMonths:0,pendingFrom:"",pendingAmt:0});set({flats:[...S.flats],modal:null});toast("✅ Flat "+f+" added")};
window.sEF=function(){const ef=S.editFlat;const o=document.getElementById("meo").value.trim(),p=document.getElementById("mep").value.trim(),m=Number(document.getElementById("mem").value),fr=document.getElementById("mef").value.trim(),a=Number(document.getElementById("mea").value);S.flats=S.flats.map(f=>f.id===ef.id?{...f,owner:o,phone:p,pendingMonths:m,pendingFrom:fr,pendingAmt:a}:f);S.payments=S.payments.map(pm=>pm.flat===ef.flat?{...pm,owner:o}:pm);set({flats:[...S.flats],payments:[...S.payments],modal:null,editFlat:null});toast("✅ "+ef.flat+" updated")};
window.eF=function(id){const f=S.flats.find(x=>x.id===id);if(f)set({editFlat:{...f},modal:"editflat"})};
window.delF=function(id){if(confirm("Delete?"))set({flats:S.flats.filter(f=>f.id!==id),modal:null,editFlat:null})};
window.bkp=function(){const d={v:3,ob:S.openBal,fl:S.flats,ex:S.expenses,py:S.payments};const b=new Blob([JSON.stringify(d)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="SitaSplendor_Backup_"+td()+".json";a.click();toast("✅ Backup saved!")};
window.rst=function(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){try{const d=JSON.parse(e.target.result);if(d.fl){S.flats=d.fl;S.expenses=d.ex||[];S.payments=d.py||[];if(d.ob!==undefined)S.openBal=d.ob;sv("fl",S.flats);sv("ex",S.expenses);sv("py",S.payments);sv("ob",S.openBal);toast("✅ Data restored!");render();}else alert("Wrong file")}catch(er){alert("Cannot read file")}};r.readAsText(f);inp.value=""};

render();
</script>
</body>
</html>
